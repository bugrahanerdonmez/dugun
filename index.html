<!doctype html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <title>Damla & Buğrahan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body>
    <header class="navbar">
        <button id="musicBtn">
            <span id="musicIcon" class="play"></span>
            Müzik Çal
        </button>

        <div class="logo">Damla & Buğrahan</div>

        <a href="https://forms.gle/1hCp9sduGJhwRTgF6" target="_blank" class="upload-btn">
            📸 Fotoğraf Yükle
        </a>
    </header>

    <section class="main fade-up">
        <h1>Davetlisiniz 🤍</h1>

        <div class="invite-card">
            <img src="assets/topludavetiye.jpg" class="invite-img" />
        </div>

        <div class="events">
            <div class="event-card fade-up">
                <h2>Nikah</h2>
                <p>📅 9 Mayıs 2026</p>
                <p>🕒 14:30</p>
                <p>📍 İzmir</p>

                <iframe src="https://www.google.com/maps?q=Zübeyde+Hanım+Evlendirme+Dairesi+Karşıyaka&z=16&output=embed"
                    class="map">
                </iframe>

                <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Damla%20%26%20Buğrahan%20Nikah&dates=20260509T143000/20260509T150000&location=Izmir&ctz=Europe/Istanbul"
                    target="_blank" class="btn">
                    🗓️ Takvimine Ekle
                </a>

                <div class="countdown">Bitti :)</div>
            </div>

            <div class="event-card fade-up">
                <h2>Düğün</h2>
                <p>📅 23 Mayıs 2026</p>
                <p>🕒 20:00</p>
                <p>📍 Bursa</p>

                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d23123.117756362128!2d28.387033839375505!3d40.02644409345486!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14b60e99acdb49b5%3A0x7d24431854e5f90c!2zQcOHRUxZQSBEw5zEnsOcTiBTQUxPTkxBUkk!5e0!3m2!1str!2sus!4v1777553835700!5m2!1str!2sus"
                    class="map"></iframe>
                <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Damla%20%26%20Buğrahan%20Düğün&dates=20260523T200000/20260523T230000&location=Bursa&ctz=Europe/Istanbul"
                    target="_blank" class="btn">
                    🗓️ Takvimine Ekle
                </a>
                <div id="countdown-wedding" class="countdown"></div>
            </div>
        </div>

        <img src="assets/giris.gif" class="gif fade-up" />
    </section>

    <section class="section fade-up">
        <h2>Galeri 📸</h2>

        <div class="swiper gallerySwiper">
            <div class="swiper-wrapper" id="galleryWrapper"></div>
        </div>
    </section>

    <audio id="music" src="assets/music.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>

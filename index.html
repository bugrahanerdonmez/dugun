<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Damla & Buğrahan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

</head>

<body>

<header class="navbar">
  <button id="musicBtn">🎵</button>
  <div class="logo">Damla & Buğrahan</div>

    <a href="https://drive.google.com/drive/folders/1FcRQL5TADkqA2ccId3OTxw696_9SLisS?usp=sharing"
    target="_blank"
    class="upload-btn">
    📸 Fotoğraf Yükle
    </a>
</header>


<section class="main fade-up">

<h1>Davetlisiniz 🤍</h1>

<img src="assets/topludavetiye.jpg" class="invite-img">

<div class="events">

  <div class="event-card fade-up">
    <h2>Nikah</h2>
    <p>📅 9 Mayıs 2026</p>
    <p>🕒 14:30</p>
    <p>📍 İzmir</p>

    <iframe src="https://www.google.com/maps?q=izmir+evlendirme+daire&output=embed" class="map"></iframe>

    <div class="event-buttons">
      <a href="#" class="btn">Harita</a>
      <a href="#" class="btn">Takvim</a>
    </div>

    <div id="countdown-nikah" class="countdown"></div>
  </div>


  <div class="event-card fade-up">
    <h2>Düğün</h2>
    <p>📅 23 Mayıs 2026</p>
    <p>🕒 20:00</p>
    <p>📍 Bursa</p>

    <iframe src="https://www.google.com/maps?q=bursa+dugun+salonu&output=embed" class="map"></iframe>

    <div class="event-buttons">
      <a href="#" class="btn">Harita</a>
      <a href="#" class="btn">Takvim</a>
    </div>

    <div id="countdown-wedding" class="countdown"></div>
  </div>

</div>

<img src="assets/giris.gif" class="gif fade-up">

</section>


<section class="section fade-up">

<h2>Galeri</h2>

<div class="swiper gallerySwiper">
  <div class="swiper-wrapper" id="galleryWrapper"></div>
</div>

</section>

<audio id="music" src="assets/music.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="script.js"></script>

</html>
